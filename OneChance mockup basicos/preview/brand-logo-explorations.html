<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>One Chance — Logo Explorations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050A14; font-family: 'DM Sans', sans-serif; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
</head>
<body>
<script type="text/babel" src="../design-canvas.jsx"></script>
<script type="text/babel">

/* ── BG ── */
const Dark = ({ children, style={} }) => (
  <div style={{ background:'#050A14', width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', ...style }}>
    {children}
  </div>
);
const Light = ({ children, style={} }) => (
  <div style={{ background:'#F0F0EE', width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', ...style }}>
    {children}
  </div>
);

/* ══════════════════════════════════════════════
   LOGO A — Wordmark puro. Dot animado.
   El original. Refinado.
══════════════════════════════════════════════ */
const LogoA = ({ size=1, dark=true }) => {
  const s = size;
  const fg = dark ? '#fff' : '#050A14';
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 4*s }}>
      <span style={{ color:fg, fontSize:22*s, fontWeight:600, fontFamily:'Space Grotesk', letterSpacing:'-0.04em' }}>ONE</span>
      <div style={{ width:6*s, height:6*s, background:'#00C853', borderRadius:'50%', animation:'blink 2s infinite', flexShrink:0 }} />
      <span style={{ color:'#00C853', fontSize:22*s, fontWeight:600, fontFamily:'Space Grotesk', letterSpacing:'-0.04em' }}>CHANCE</span>
    </div>
  );
};

/* ══════════════════════════════════════════════
   LOGO B — Escudo / Shield isotipo + wordmark
══════════════════════════════════════════════ */
const ShieldIcon = ({ size=32, accent='#00C853' }) => (
  <svg width={size} height={size*1.1} viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 1 L38 8 L38 22 C38 33 30 40 20 43 C10 40 2 33 2 22 L2 8 Z" fill={accent} opacity="0.15" />
    <path d="M20 1 L38 8 L38 22 C38 33 30 40 20 43 C10 40 2 33 2 22 L2 8 Z" stroke={accent} strokeWidth="1.5" fill="none" />
    <text x="20" y="26" textAnchor="middle" fill={accent} fontSize="12" fontWeight="700" fontFamily="Space Grotesk">OC</text>
  </svg>
);

const LogoB = ({ size=1, dark=true }) => {
  const fg = dark ? '#fff' : '#050A14';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10*size }}>
      <ShieldIcon size={36*size} />
      <div>
        <div style={{ color:fg, fontSize:18*size, fontWeight:600, fontFamily:'Space Grotesk', letterSpacing:'-0.03em', lineHeight:1 }}>ONE CHANCE</div>
        <div style={{ color:'rgba(0,200,83,0.7)', fontSize:8*size, letterSpacing:'0.12em', marginTop:2*size, fontFamily:'DM Sans' }}>SCOUTING PLATFORM</div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════
   LOGO C — Stacked. "1" como elemento gráfico.
══════════════════════════════════════════════ */
const LogoC = ({ size=1, dark=true }) => {
  const fg = dark ? '#fff' : '#050A14';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12*size }}>
      {/* "1" grande como isotipo */}
      <div style={{ position:'relative', width:40*size, height:50*size, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <span style={{ color:'#00C853', fontSize:52*size, fontWeight:700, fontFamily:'Bebas Neue', lineHeight:1, letterSpacing:'-0.02em', opacity:0.15, position:'absolute' }}>1</span>
        <span style={{ color:'#00C853', fontSize:52*size, fontWeight:700, fontFamily:'Bebas Neue', lineHeight:1, letterSpacing:'-0.02em', position:'relative' }}>1</span>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:1*size }}>
        <div style={{ color:fg, fontSize:22*size, fontWeight:700, fontFamily:'Bebas Neue', letterSpacing:'0.06em', lineHeight:1 }}>ONE</div>
        <div style={{ color:'#00C853', fontSize:22*size, fontWeight:700, fontFamily:'Bebas Neue', letterSpacing:'0.06em', lineHeight:1 }}>CHANCE</div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════
   LOGO D — Minimalista. Slash como separador.
   "ONE / CHANCE"
══════════════════════════════════════════════ */
const LogoD = ({ size=1, dark=true }) => {
  const fg = dark ? '#fff' : '#050A14';
  return (
    <div style={{ display:'flex', alignItems:'baseline', gap:6*size }}>
      <span style={{ color:fg, fontSize:20*size, fontWeight:500, fontFamily:'DM Sans', letterSpacing:'-0.02em' }}>ONE</span>
      <span style={{ color:'#00C853', fontSize:28*size, fontWeight:300, fontFamily:'DM Sans', lineHeight:1, transform:'skewX(-12deg)', display:'inline-block', margin:`0 ${-2*size}px` }}>/</span>
      <span style={{ color:'#00C853', fontSize:20*size, fontWeight:500, fontFamily:'DM Sans', letterSpacing:'-0.02em' }}>CHANCE</span>
    </div>
  );
};

/* ══════════════════════════════════════════════
   LOGO E — Badge compacto. Sport style.
══════════════════════════════════════════════ */
const LogoE = ({ size=1, dark=true }) => {
  const bg = dark ? 'rgba(0,200,83,0.08)' : 'rgba(0,200,83,0.12)';
  const fg = dark ? '#fff' : '#050A14';
  return (
    <div style={{ display:'inline-flex', flexDirection:'column', alignItems:'center', background:bg, border:'1.5px solid rgba(0,200,83,0.35)', borderRadius:10*size, padding:`${10*size}px ${18*size}px`, gap:2*size }}>
      <div style={{ color:'rgba(0,200,83,0.6)', fontSize:7*size, letterSpacing:'0.14em', fontFamily:'DM Sans', fontWeight:500 }}>SCOUTING PLATFORM</div>
      <div style={{ color:fg, fontSize:22*size, fontWeight:700, fontFamily:'Space Grotesk', letterSpacing:'-0.01em', lineHeight:1 }}>
        ONE <span style={{ color:'#00C853' }}>CHANCE</span>
      </div>
      <div style={{ width:24*size, height:1.5, background:'linear-gradient(90deg,transparent,#00C853,transparent)' }} />
    </div>
  );
};

/* ══════════════════════════════════════════════
   LOGO F — Icono geométrico: "OC" en rombo
══════════════════════════════════════════════ */
const DiamondIcon = ({ size=40 }) => (
  <svg width={size} height={size} viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="1" width="26" height="26" rx="3" transform="rotate(45 20 20)" fill="rgba(0,200,83,0.1)" stroke="#00C853" strokeWidth="1.2" />
    <text x="20" y="24" textAnchor="middle" fill="#00C853" fontSize="11" fontWeight="700" fontFamily="Space Grotesk">OC</text>
  </svg>
);

const LogoF = ({ size=1, dark=true }) => {
  const fg = dark ? '#fff' : '#050A14';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10*size }}>
      <DiamondIcon size={38*size} />
      <div>
        <div style={{ color:fg, fontSize:17*size, fontWeight:600, fontFamily:'Space Grotesk', letterSpacing:'-0.02em', lineHeight:1 }}>
          ONE <span style={{ color:'#00C853' }}>CHANCE</span>
        </div>
        <div style={{ color:'rgba(255,255,255,0.3)', fontSize:7.5*size, letterSpacing:'0.1em', marginTop:3*size, fontFamily:'DM Sans', display: dark ? 'block' : 'none' }}>PROFESSIONAL FOOTBALL SCOUTING</div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════
   LOGO G — Sport numeral. "OC" condensado.
══════════════════════════════════════════════ */
const LogoG = ({ size=1, dark=true }) => {
  const fg = dark ? '#fff' : '#050A14';
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap:0 }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:0 }}>
        <span style={{ color:fg, fontSize:36*size, fontWeight:700, fontFamily:'Barlow Condensed', letterSpacing:'0.04em', lineHeight:1 }}>ONE</span>
        <span style={{ color:'#00C853', fontSize:36*size, fontWeight:700, fontFamily:'Barlow Condensed', letterSpacing:'0.04em', lineHeight:1, marginLeft:6*size }}>CHANCE</span>
      </div>
      <div style={{ width:'100%', height:2*size, background:'linear-gradient(90deg,#00C853,rgba(0,200,83,0.3))', borderRadius:1 }} />
      <div style={{ color:'rgba(0,200,83,0.5)', fontSize:7.5*size, letterSpacing:'0.16em', marginTop:3*size, fontFamily:'DM Sans', fontWeight:500 }}>SCOUTING · FÚTBOL PROFESIONAL</div>
    </div>
  );
};

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App() {
  return (
    <DCCanvas title="One Chance — Exploración de Logo">

      {/* ── ROW 1: Wordmarks ── */}
      <DCSection id="wordmarks" title="Wordmarks">

        <DCArtboard id="a-dark" label="A — Wordmark · Dark" width={420} height={180}>
          <Dark>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:32 }}>
              <LogoA size={1.4} dark={true} />
              <LogoA size={0.85} dark={true} />
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="a-light" label="A — Wordmark · Light" width={420} height={180}>
          <Light>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:32 }}>
              <LogoA size={1.4} dark={false} />
              <LogoA size={0.85} dark={false} />
            </div>
          </Light>
        </DCArtboard>

        <DCArtboard id="d-dark" label="D — Slash / Minimalista" width={420} height={180}>
          <Dark>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:32 }}>
              <LogoD size={1.4} />
              <LogoD size={0.9} />
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="g-dark" label="G — Condensed Sport" width={420} height={180}>
          <Dark>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:32 }}>
              <LogoG size={1.1} />
              <LogoG size={0.75} />
            </div>
          </Dark>
        </DCArtboard>

      </DCSection>

      {/* ── ROW 2: Con isotipo ── */}
      <DCSection id="isotipos" title="Con Isotipo">

        <DCArtboard id="b-shield" label="B — Escudo OC + Wordmark" width={420} height={180}>
          <Dark>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:28 }}>
              <LogoB size={1.3} />
              <LogoB size={0.85} />
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="c-numeral" label="C — Numeral 1 + Wordmark" width={420} height={180}>
          <Dark>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:28 }}>
              <LogoC size={1.1} />
              <LogoC size={0.75} />
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="f-diamond" label="F — Rombo OC + Wordmark" width={420} height={180}>
          <Dark>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:28 }}>
              <LogoF size={1.3} />
              <LogoF size={0.85} />
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="e-badge" label="E — Badge compacto" width={420} height={180}>
          <Dark>
            <LogoE size={1.15} />
          </Dark>
        </DCArtboard>

      </DCSection>

      {/* ── ROW 3: Contexto real ── */}
      <DCSection id="contexto" title="En Contexto">

        <DCArtboard id="nav-context" label="A — En navegación" width={600} height={120}>
          <Dark>
            <div style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 32px', borderBottom:'0.5px solid rgba(255,255,255,0.06)', height:'100%' }}>
              <LogoA size={1} />
              <div style={{ display:'flex', gap:24 }}>
                {['Jugadores','Técnicos','Clubes'].map(l => <span key={l} style={{ color:'rgba(255,255,255,0.35)', fontSize:12, fontFamily:'DM Sans' }}>{l}</span>)}
              </div>
              <div style={{ background:'#00C853', color:'#002A12', fontSize:12, fontWeight:500, padding:'7px 16px', borderRadius:7, fontFamily:'DM Sans' }}>Publicar perfil</div>
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="nav-context-g" label="G — En navegación" width={600} height={120}>
          <Dark>
            <div style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 32px', borderBottom:'0.5px solid rgba(255,255,255,0.06)', height:'100%' }}>
              <LogoG size={0.7} />
              <div style={{ display:'flex', gap:24 }}>
                {['Jugadores','Técnicos','Clubes'].map(l => <span key={l} style={{ color:'rgba(255,255,255,0.35)', fontSize:12, fontFamily:'DM Sans' }}>{l}</span>)}
              </div>
              <div style={{ background:'#00C853', color:'#002A12', fontSize:12, fontWeight:500, padding:'7px 16px', borderRadius:7, fontFamily:'DM Sans' }}>Publicar perfil</div>
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="app-icon-c" label="C — App icon / Avatar" width={300} height={200}>
          <Dark>
            <div style={{ display:'flex', gap:16, alignItems:'center' }}>
              {[64, 48, 32, 24].map(s => (
                <div key={s} style={{ width:s, height:s, borderRadius:s*0.22, background:'#050A14', border:'1px solid rgba(0,200,83,0.3)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <svg width={s*0.65} height={s*0.72} viewBox="0 0 40 44" fill="none">
                    <path d="M20 1 L38 8 L38 22 C38 33 30 40 20 43 C10 40 2 33 2 22 L2 8 Z" fill="rgba(0,200,83,0.15)" stroke="#00C853" strokeWidth="2" />
                    <text x="20" y="27" textAnchor="middle" fill="#00C853" fontSize="13" fontWeight="700" fontFamily="Space Grotesk">OC</text>
                  </svg>
                </div>
              ))}
            </div>
          </Dark>
        </DCArtboard>

        <DCArtboard id="app-icon-diamond" label="F — App icon / Diamond" width={300} height={200}>
          <Dark>
            <div style={{ display:'flex', gap:16, alignItems:'center' }}>
              {[64, 48, 32, 24].map(s => (
                <div key={s} style={{ width:s, height:s, borderRadius:s*0.22, background:'#050A14', border:'1px solid rgba(0,200,83,0.2)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <svg width={s*0.7} height={s*0.7} viewBox="0 0 40 40" fill="none">
                    <rect x="20" y="1" width="26" height="26" rx="3" transform="rotate(45 20 20)" fill="rgba(0,200,83,0.12)" stroke="#00C853" strokeWidth="1.5" />
                    <text x="20" y="24" textAnchor="middle" fill="#00C853" fontSize="11" fontWeight="700" fontFamily="Space Grotesk">OC</text>
                  </svg>
                </div>
              ))}
            </div>
          </Dark>
        </DCArtboard>

      </DCSection>

    </DCCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
