<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050A14; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; gap: 8px; align-items: center; }
.chip { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; flex: 1; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.chip-name { color: rgba(255,255,255,0.5); font-size: 10px; }
.chip-val { color: rgba(255,255,255,0.25); font-size: 9px; margin-left: auto; }
.section-title { color: rgba(255,255,255,0.2); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; margin-top: 4px; }
</style>
</head><body>
<div class="section-title">Text</div>
<div class="row">
  <div class="chip" style="background:rgba(255,255,255,0.03)"><div class="dot" style="background:#fff"></div><div class="chip-name">text-primary</div><div class="chip-val">#FFF</div></div>
  <div class="chip" style="background:rgba(255,255,255,0.03)"><div class="dot" style="background:rgba(255,255,255,0.6)"></div><div class="chip-name">text-secondary</div><div class="chip-val">60%</div></div>
</div>
<div class="row">
  <div class="chip" style="background:rgba(255,255,255,0.03)"><div class="dot" style="background:rgba(255,255,255,0.35)"></div><div class="chip-name">text-muted</div><div class="chip-val">35%</div></div>
  <div class="chip" style="background:rgba(255,255,255,0.03)"><div class="dot" style="background:rgba(255,255,255,0.2)"></div><div class="chip-name">text-dim</div><div class="chip-val">20%</div></div>
</div>
<div class="row">
  <div class="chip" style="background:rgba(255,255,255,0.03)"><div class="dot" style="background:#00C853"></div><div class="chip-name">text-green (accent)</div><div class="chip-val">#00C853</div></div>
  <div class="chip" style="background:rgba(255,255,255,0.03)"><div class="dot" style="background:#5A8FFF"></div><div class="chip-name">text-blue (accent)</div><div class="chip-val">#5A8FFF</div></div>
</div>
<div class="section-title">Borders</div>
<div class="row">
  <div class="chip" style="border:0.5px solid rgba(255,255,255,0.05)"><div class="chip-name">border-subtle</div><div class="chip-val">5%</div></div>
  <div class="chip" style="border:0.5px solid rgba(255,255,255,0.1)"><div class="chip-name">border-low</div><div class="chip-val">10%</div></div>
  <div class="chip" style="border:0.5px solid rgba(255,255,255,0.15)"><div class="chip-name">border-mid</div><div class="chip-val">15%</div></div>
</div>
<div class="row">
  <div class="chip" style="border:0.5px solid rgba(0,200,83,0.25)"><div class="chip-name">border-green</div><div class="chip-val">25%</div></div>
  <div class="chip" style="border:0.5px solid rgba(80,140,255,0.2)"><div class="chip-name">border-blue</div><div class="chip-val">20%</div></div>
</div>
</body></html>
