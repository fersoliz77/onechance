<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050A14; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.label { color: rgba(255,255,255,0.2); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.row { display: flex; gap: 12px; }

/* Logo */
.logo-lg { display: flex; align-items: baseline; gap: 2px; }
.logo-one { color: #fff; font-size: 28px; font-weight: 500; letter-spacing: -0.03em; }
.logo-chance { color: #00C853; font-size: 28px; font-weight: 500; letter-spacing: -0.03em; }
.logo-dot { width: 7px; height: 7px; background: #00C853; border-radius: 50%; margin: 0 2px 2px; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.logo-sm { display: flex; align-items: baseline; gap: 2px; }
.logo-sm .logo-one { font-size: 16px; }
.logo-sm .logo-chance { font-size: 16px; }
.logo-sm .logo-dot { width: 4px; height: 4px; margin: 0 1px 1px; }

/* On light bg */
.on-light { background: #f0f0ee; border-radius: 8px; padding: 14px 20px; display: inline-flex; align-items: center; }
.on-light .logo-one { color: #050A14; }
.on-light .logo-chance { color: #00A844; }
.on-light .logo-dot { background: #00A844; }

/* Wordmark only text */
.wordmark-text { color: rgba(255,255,255,0.3); font-size: 11px; line-height: 1.6; }
.green { color: #00C853; }
</style>
</head><body>
<div>
  <div class="label">Logo — Large</div>
  <div class="logo-lg">
    <span class="logo-one">ONE</span>
    <div class="logo-dot"></div>
    <span class="logo-chance">CHANCE</span>
  </div>
</div>
<div class="row">
  <div>
    <div class="label">Small</div>
    <div class="logo-sm logo-lg">
      <span class="logo-one">ONE</span>
      <div class="logo-dot"></div>
      <span class="logo-chance">CHANCE</span>
    </div>
  </div>
  <div>
    <div class="label">On Light</div>
    <div class="on-light">
      <div class="logo-sm logo-lg">
        <span class="logo-one" style="color:#050A14">ONE</span>
        <div class="logo-dot" style="background:#00A844"></div>
        <span class="logo-chance" style="color:#00A844">CHANCE</span>
      </div>
    </div>
  </div>
</div>
<div>
  <div class="label">Construction</div>
  <div class="wordmark-text">
    <span style="color:#fff">"ONE"</span> white · <span class="green">animated dot</span> · <span class="green">"CHANCE"</span> green<br>
    Font: DM Sans 500 · tracking -0.02em · no image assets
  </div>
</div>
</body></html>
