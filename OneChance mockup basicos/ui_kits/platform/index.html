const { useState, useEffect, useCallback } = React;

/* ── Simple hash router ── */
function useRoute() {
  const parse = () => {
    const hash = window.location.hash.replace('#','') || '/jugadores';
    const [path, qs] = hash.split('?');
    const params = {};
    if (qs) qs.split('&').forEach(p => { const [k,v] = p.split('='); params[k] = v; });
    return { path, params };
  };
  const [route, setRoute] = useState(parse);
  useEffect(() => {
    const handler = () => setRoute(parse());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  const navigate = useCallback((to) => {
    window.location.hash = to;
  }, []);
  return { route, navigate };
}

/* ── App shell ── */
function App() {
  const { route, navigate } = useRoute();
  const [user, setUser] = useState(null);

  const handleLogin = (u) => setUser(u);
  const handleLogout = () => { setUser(null); navigate('/jugadores'); };

  // Route matching
  const path = route.path;
  const params = route.params;

  const playerMatch  = path.match(/^\/jugadores\/(\d+)$/);
  const coachMatch   = path.match(/^\/tecnicos\/(\d+)$/);
  const clubMatch    = path.match(/^\/clubes\/(\d+)$/);
  const agentMatch   = path.match(/^\/representantes\/(\d+)$/);

  // Guard private routes
  useEffect(() => {
    if ((path === '/dashboard' || path === '/admin') && !user) navigate('/auth?tab=login');
    if (path === '/admin' && user && user.role !== 'admin') navigate('/dashboard');
  }, [path, user]);

  return (
    <>
      <OcBackground subtle={path !== '/'} />
      <OcNavBar currentRoute={path} navigate={navigate} user={user} onAuthClick={handleLogout} />

      {path === '/'                && <LandingScreen navigate={navigate} />}
      {path === '/jugadores'      && !playerMatch && <PlayersListScreen navigate={navigate} />}
      {playerMatch                 && <PlayerProfileScreen playerId={playerMatch[1]} navigate={navigate} />}
      {path === '/tecnicos'       && !coachMatch  && <TecsScreen navigate={navigate} />}
      {coachMatch                  && <CoachProfileScreen coachId={coachMatch[1]} navigate={navigate} />}
      {path === '/clubes'         && !clubMatch   && <ClubsScreen navigate={navigate} />}
      {clubMatch                   && <ClubProfileScreen clubId={clubMatch[1]} navigate={navigate} />}
      {path === '/representantes' && !agentMatch  && <AgentsScreen navigate={navigate} />}
      {agentMatch                  && <AgentProfileScreen agentId={agentMatch[1]} navigate={navigate} />}
      {path === '/auth'           && <AuthScreen navigate={navigate} onLogin={handleLogin} initialTab={params.tab || 'login'} />}
      {path === '/dashboard'      && user && <DashboardScreen user={user} navigate={navigate} />}
      {path === '/admin'          && user?.role === 'admin' && <AdminScreen user={user} navigate={navigate} />}
    </>
  );
}

// TecsScreen, ClubsScreen, AgentsScreen are defined in ProfileScreens.jsx

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
